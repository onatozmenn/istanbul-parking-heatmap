name: Haftalık Profil Güncelleme

on:
  schedule:
    # Her Pazartesi 04:37 UTC (07:37 TR)
    - cron: '37 4 * * 1'
  workflow_dispatch:
    inputs:
      force:
        description: 'Minimum gün kontrolünü atla'
        required: false
        default: 'false'

concurrency:
  group: ispark-history-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Son veritabanını geri yükle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data .artifact
          RUN_ID=$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=ispark-history&per_page=100" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | last | .workflow_run.id // empty')
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --name ispark-history --dir .artifact
            test -f .artifact/ispark_history.db
            cp .artifact/ispark_history.db data/ispark_history.db
          elif [ -f data/ispark_history.db ]; then
            echo "::warning::Canlı artifact bulunamadı; haftalık repo checkpoint'i kullanılıyor."
          else
            echo "::error::Ne artifact ne de repo checkpoint'i bulunabildi."
            exit 1
          fi

      - name: Profilleri oluştur
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scripts/build_profiles.py --min-days 7 --max-age-hours 6 $FORCE_FLAG

      - name: Değişiklikleri commit & push et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/ data/ispark_history.db
          if git diff --cached --quiet; then
            echo "Değişiklik yok, commit atlanıyor."
          else
            git commit -m "data: haftalık profiller güncellendi $(date -u +'%Y-%m-%d')"
            git pull --rebase
            git push
          fi
